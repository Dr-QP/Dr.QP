---
- name: Install Xpra and related packages
  when: install_xpra | default(false) | bool
  block:
    - name: Clone Xpra repository (pinned to v6.4.3 tag)
      ansible.builtin.git:
        repo: https://github.com/Xpra-org/xpra.git
        dest: /tmp/xpra
        version: 831ccc2b6828b17d31dcad40f2b318030028e837
        depth: 1

    - name: Install Xpra repository using setup.py
      ansible.builtin.command:
        cmd: python3 /tmp/xpra/setup.py install-lts-repo
        creates: /etc/apt/sources.list.d/xpra.list

    - name: Clean up Xpra repository clone
      ansible.builtin.file:
        path: /tmp/xpra
        state: absent

    - name: Install Xpra server package
      ansible.builtin.apt:
        name:
          - xpra
        state: present
        install_recommends: false

    - name: Clone Xpra-html5 repository (pinned to v19 tag)
      ansible.builtin.git:
        repo: https://github.com/Xpra-org/xpra-html5.git
        dest: /tmp/xpra-html5
        version: 462cadec215acd1bb7d2d8fdc58d5040a0412540
        depth: 1

    - name: Install Xpra-html5 repository using setup.py
      ansible.builtin.command:
        cmd: python3 /tmp/xpra-html5/setup.py install
        creates: /etc/apt/sources.list.d/xpra-html5.list

    - name: Clean up Xpra-html5 repository clone
      ansible.builtin.file:
        path: /tmp/xpra-html5
        state: absent

    - name: Install VirtualGL from GitHub releases
      block:
        - name: Detect system architecture for VirtualGL
          ansible.builtin.set_fact:
            xpra_setup_virtualgl_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
            xpra_setup_virtualgl_version: "3.1.4"
            xpra_setup_virtualgl_checksums:
              amd64: "sha256:02edc6b599571c385389af1a006f07a70c298e1d97c580a9bfd4b39d835c51e6"
              arm64: "sha256:5583e08ee5694d14c6ea0f25d2cfd73fa6d5077869c6645c334a948265a777bb"

        - name: Download VirtualGL DEB package
          ansible.builtin.get_url:
            url: >-
              https://github.com/VirtualGL/virtualgl/releases/download/{{ xpra_setup_virtualgl_version }}/virtualgl_{{
              xpra_setup_virtualgl_version }}_{{ xpra_setup_virtualgl_arch }}.deb
            dest: "/tmp/virtualgl_{{ xpra_setup_virtualgl_version }}_{{ xpra_setup_virtualgl_arch }}.deb"
            checksum: "{{ xpra_setup_virtualgl_checksums[xpra_setup_virtualgl_arch] }}"
            mode: "0644"

        - name: Install VirtualGL DEB package
          ansible.builtin.apt:
            deb: "/tmp/virtualgl_{{ xpra_setup_virtualgl_version }}_{{ xpra_setup_virtualgl_arch }}.deb"
            state: present

        - name: Clean up VirtualGL DEB file
          ansible.builtin.file:
            path: "/tmp/virtualgl_{{ xpra_setup_virtualgl_version }}_{{ xpra_setup_virtualgl_arch }}.deb"
            state: absent

    - name: Install Mesa and OpenGL support packages
      ansible.builtin.apt:
        name:
          - mesa-utils
          - menu-xdg
          - python3-opengl
          - python3-pyinotify
          - python3-xdg
          - libgl1
          - libglvnd0
          - xvfb
        state: present
        install_recommends: false

    - name: Install software rendering support (Mesa DRI with llvmpipe)
      ansible.builtin.apt:
        name:
          - libgl1-mesa-dri
        state: present
        install_recommends: false
