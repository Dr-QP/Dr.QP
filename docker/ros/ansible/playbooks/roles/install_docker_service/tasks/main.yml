---
- name: Restart Docker service to apply config changes
  ansible.builtin.systemd_service:
    name: docker.service
    state: >-
      {{
        'restarted'
        if install_docker_docker_daemon_config.changed | default(false)
        else 'started'
      }}
    enabled: true
    daemon_reload: true

- name: Ensure containerd service is running
  ansible.builtin.systemd_service:
    name: containerd.service
    state: started
    enabled: true
