---
# docker-pass CLI plugin installation tasks
# Builds and installs a Linux Docker CLI launcher around the upstream
# docker/secrets-engine plugins/pass module.

- name: Install Go programming language
  ansible.builtin.apt:
    name: golang-go
    state: present
    update_cache: true
    install_recommends: false

- name: Install docker-pass runtime dependencies
  ansible.builtin.apt:
    name:
      - git
      - dbus
      - dbus-x11
      - gnome-keyring
      - libglib2.0-bin
    state: present
    install_recommends: false

- name: Create Docker CLI plugins directory
  ansible.builtin.file:
    path: "{{ docker_pass_user_home }}/.docker/cli-plugins"
    state: directory
    owner: "{{ docker_pass_user }}"
    group: "{{ docker_pass_user }}"
    mode: "0755"

- name: Create temporary directory for secrets-engine
  ansible.builtin.tempfile:
    state: directory
    prefix: secrets_engine_
  register: docker_pass_temp_dir
  become: true
  become_user: "{{ docker_pass_user }}"

- name: Clone secrets-engine repository
  ansible.builtin.git:
    repo: "{{ docker_pass_repo_url }}"
    dest: "{{ docker_pass_temp_dir.path }}"
    version: "{{ docker_pass_version }}"
    depth: 1
  become: true
  become_user: "{{ docker_pass_user }}"

- name: Create docker-pass launcher directory
  ansible.builtin.file:
    path: "{{ docker_pass_temp_dir.path }}/plugins/pass/cmd/docker-pass"
    state: directory
    owner: "{{ docker_pass_user }}"
    group: "{{ docker_pass_user }}"
    mode: "0755"
  become: true
  become_user: "{{ docker_pass_user }}"

- name: Install docker-pass launcher source
  ansible.builtin.template:
    src: docker-pass-main.go.j2
    dest: "{{ docker_pass_temp_dir.path }}/plugins/pass/cmd/docker-pass/main.go"
    owner: "{{ docker_pass_user }}"
    group: "{{ docker_pass_user }}"
    mode: "0644"
  become: true
  become_user: "{{ docker_pass_user }}"

- name: Build docker-pass plugin
  ansible.builtin.command:
    cmd: >-
      go build -trimpath -o "{{ docker_pass_user_home }}/.docker/cli-plugins/docker-pass" ./cmd/docker-pass
    chdir: "{{ docker_pass_temp_dir.path }}/plugins/pass"
  environment:
    HOME: "{{ docker_pass_user_home }}"
    PATH: "{{ ansible_env.PATH }}:/usr/local/go/bin:{{ docker_pass_user_home }}/go/bin"
    GOPATH: "{{ docker_pass_user_home }}/go"
  become: true
  become_user: "{{ docker_pass_user }}"
  changed_when: true

- name: Set docker-pass executable permissions
  ansible.builtin.file:
    path: "{{ docker_pass_user_home }}/.docker/cli-plugins/docker-pass"
    owner: "{{ docker_pass_user }}"
    group: "{{ docker_pass_user }}"
    mode: "0755"

- name: Verify docker-pass plugin metadata
  ansible.builtin.command:
    cmd: "{{ docker_pass_user_home }}/.docker/cli-plugins/docker-pass docker-cli-plugin-metadata"
  register: docker_pass_metadata
  changed_when: false
  become: true
  become_user: "{{ docker_pass_user }}"

- name: Fail if docker-pass plugin metadata is unavailable
  ansible.builtin.fail:
    msg: "docker-pass plugin was not installed correctly"
  when: docker_pass_metadata.rc != 0

- name: Clean up temporary directory
  ansible.builtin.file:
    path: "{{ docker_pass_temp_dir.path }}"
    state: absent
  become: true
  become_user: "{{ docker_pass_user }}"
  when: docker_pass_temp_dir.path is defined
