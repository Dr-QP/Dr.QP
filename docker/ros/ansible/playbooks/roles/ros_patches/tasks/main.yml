---
# Install ROS patch packages from the upstream building pool.
# These are fixes that exist upstream but have not yet been promoted to the
# official apt repo for the target architecture.

- name: Create temporary directory for patch downloads
  ansible.builtin.tempfile:
    state: directory
  register: ros_patches_temp_dir
  become: false

- name: Download and install each patch package
  when: (patch.arch is not defined) or (patch.arch == system_arch)
  loop: "{{ ros_patches_packages }}"
  loop_control:
    loop_var: patch
    label: "{{ patch.name }}"
  block:
    - name: "Download {{ patch.name }}"
      ansible.builtin.get_url:
        url: "{{ patch.url }}"
        dest: "{{ ros_patches_temp_dir.path }}/{{ patch.name }}.deb"
        mode: "0644"
      become: false

    - name: "Install {{ patch.name }}"
      ansible.builtin.apt:
        deb: "{{ ros_patches_temp_dir.path }}/{{ patch.name }}.deb"
        state: present

    - name: "Hold {{ patch.name }} to prevent apt from downgrading it"
      ansible.builtin.dpkg_selections:
        name: "{{ patch.name }}"
        selection: hold

- name: Clean up temporary directory
  ansible.builtin.file:
    path: "{{ ros_patches_temp_dir.path }}"
    state: absent
  become: false
