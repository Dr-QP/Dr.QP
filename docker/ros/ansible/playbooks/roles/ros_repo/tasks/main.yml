---
- name: Extract version from release info
  ansible.builtin.set_fact:
    # https://github.com/ros-infrastructure/ros-apt-source/releases
    ros_repo_apt_source_version: "1.2.0"

- name: Set ros2-apt-source package URL
  ansible.builtin.set_fact:
    ros_repo_apt_source_url: >-
      https://github.com/ros-infrastructure/ros-apt-source/releases/download/{{
      ros_repo_apt_source_version }}/ros2-apt-source_{{  ros_repo_apt_source_version }}.{{ system_dist }}_all.deb
- name: Download ros2-apt-source package
  ansible.builtin.get_url:
    url: "{{ ros_repo_apt_source_url }}"
    dest: /tmp/ros2-apt-source.deb
    mode: "0644"

- name: Install ros2-apt-source package
  ansible.builtin.apt:
    deb: /tmp/ros2-apt-source.deb
    state: present

- name: Update APT cache
  ansible.builtin.apt:
    update_cache: true

- name: Clean up downloaded package
  ansible.builtin.file:
    path: /tmp/ros2-apt-source.deb
    state: absent
