---
- name: Fail when VirtualHere USB client architecture is unsupported
  ansible.builtin.fail:
    msg: >-
      Unsupported architecture '{{ ansible_facts['architecture'] | default('unknown') }}'. Set
      virtualhere_usb_client_download_url to a compatible VirtualHere client
      binary URL.
  when: virtualhere_usb_client_download_url is not defined or virtualhere_usb_client_download_url in [none, ""]

- name: Download VirtualHere USB client
  ansible.builtin.get_url:
    url: "{{ virtualhere_usb_client_download_url }}"
    dest: "{{ virtualhere_usb_client_install_path }}"
    owner: root
    group: root
    mode: "{{ virtualhere_usb_client_binary_mode }}"
  notify: Restart VirtualHere USB client

- name: Install VirtualHere USB client systemd service
  ansible.builtin.template:
    src: virtualhereclient.service.j2
    dest: "/etc/systemd/system/{{ virtualhere_usb_client_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart VirtualHere USB client

- name: Ensure VirtualHere USB client service is running
  ansible.builtin.systemd_service:
    name: "{{ virtualhere_usb_client_service_name }}.service"
    state: started
    enabled: true
    daemon_reload: true
  when: virtualhere_usb_client_manage_service | bool
