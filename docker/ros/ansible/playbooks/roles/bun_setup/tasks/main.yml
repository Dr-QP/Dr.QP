---
# Install Bun JavaScript runtime from the official installer
- name: Check if Bun is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/bun
  register: bun_setup_bun_binary

- name: Check if bunx is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/bunx
  register: bun_setup_bunx_binary

- name: Install Bun installer prerequisites
  ansible.builtin.apt:
    name:
      - unzip
    state: present
    install_recommends: false
  when: not bun_setup_bun_binary.stat.exists

- name: Create temporary directory for Bun installer
  ansible.builtin.tempfile:
    state: directory
  register: bun_setup_temp_dir
  when: not bun_setup_bun_binary.stat.exists

- name: Download Bun install script
  ansible.builtin.get_url:
    url: https://bun.com/install
    dest: "{{ bun_setup_temp_dir.path }}/bun-install.sh"
    mode: "0755"
  when: not bun_setup_bun_binary.stat.exists

- name: Install Bun to /usr/local/bin
  ansible.builtin.shell:
    cmd: "{{ bun_setup_temp_dir.path }}/bun-install.sh"
    executable: /bin/bash
    creates: /usr/local/bin/bun
  environment:
    BUN_INSTALL: /usr/local
  when: not bun_setup_bun_binary.stat.exists

- name: Ensure bunx is available alongside Bun
  ansible.builtin.file:
    src: /usr/local/bin/bun
    dest: /usr/local/bin/bunx
    state: link
  when: not bun_setup_bunx_binary.stat.exists

- name: Clean up temporary directory
  ansible.builtin.file:
    path: "{{ bun_setup_temp_dir.path }}"
    state: absent
  when: not bun_setup_bun_binary.stat.exists and bun_setup_temp_dir.path is defined

- name: Ensure Bun bin is on bash PATH
  ansible.builtin.blockinfile:
    path: /root/.bashrc
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: bun_setup"
    block: |
      if [ -d "$HOME/.bun/bin" ]; then
        case ":$PATH:" in
          *":$HOME/.bun/bin:"*) ;;
          *) export PATH="$HOME/.bun/bin:$PATH" ;;
        esac
      fi

- name: Ensure fish config directory exists
  ansible.builtin.file:
    path: /root/.config/fish
    state: directory
    mode: "0755"

- name: Ensure Bun bin is on fish PATH
  ansible.builtin.blockinfile:
    path: /root/.config/fish/config.fish
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: bun_setup"
    block: |
      if test -d "$HOME/.bun/bin"
          if not contains "$HOME/.bun/bin" $PATH
              set -gx PATH "$HOME/.bun/bin" $PATH
          end
      end
