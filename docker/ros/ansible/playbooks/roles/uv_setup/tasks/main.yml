---
# Install uv Python package manager from the official installer
- name: Create temporary directory for uv installer
  ansible.builtin.tempfile:
    state: directory
  register: uv_temp_dir

- name: Download uv install script
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: "{{ uv_temp_dir.path }}/uv-install.sh"
    mode: "0755"

- name: Install uv to /usr/local/bin
  ansible.builtin.shell:
    cmd: "{{ uv_temp_dir.path }}/uv-install.sh"
    executable: /bin/sh
    creates: /usr/local/bin/uv
  environment:
    UV_INSTALL_DIR: /usr/local/bin
    UV_NO_MODIFY_PATH: "1"

- name: Clean up temporary directory
  ansible.builtin.file:
    path: "{{ uv_temp_dir.path }}"
    state: absent
  when: uv_temp_dir.path is defined
