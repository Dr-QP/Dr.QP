---
- name: Install husky (required by auggie prepare script)
  community.general.npm:
    name: "husky"
    global: true
    state: present

- name: Install @modelcontextprotocol/inspector
  community.general.npm:
    name: "@modelcontextprotocol/inspector"
    global: true
    state: present

- name: Install @augmentcode/auggie
  community.general.npm:
    name: "@augmentcode/auggie"
    global: true
    state: present
