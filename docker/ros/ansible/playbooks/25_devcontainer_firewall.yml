---
# Installs firewall tools and the init-firewall.sh script into the devcontainer.
# Run this playbook once (postCreateCommand) to prepare the container;
# then call `sudo /usr/local/bin/init-firewall.sh` on every container start
# (postStartCommand) to activate the network restrictions.
- name: Setup Devcontainer Firewall
  hosts: all
  become: true
  gather_facts: true

  roles:
    - { role: extra_facts, tags: ["extra_facts", "always"] }
    - { role: devcontainer_firewall, tags: ["devcontainer_firewall"] }
