[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "launch"
version = "3.9.6"
description = "Launch processes specified in launch files."
license = {text = "Apache License, Version 2.0"}
authors = [{name = "Dirk Thomas", email = "dthomas@osrfoundation.org"}]
maintainers = [
    {name = "Aditya Pande", email = "aditya.pande@openrobotics.org"},
    {name = "Brandon Ong", email = "brandon@openrobotics.org"},
    {name = "William Woodall", email = "william@openrobotics.org"},
]
keywords = ["ROS"]
classifiers = [
    "Intended Audience :: Developers",
    "Programming Language :: Python",
    "Topic :: Software Development",
]
dependencies = []

[project.optional-dependencies]
test = ["pytest"]

[project.urls]
Homepage = "https://github.com/ros2/launch"
Download = "https://github.com/ros2/launch/releases"

[tool.setuptools.packages.find]
exclude = ["test*"]

[tool.setuptools.package-data]
"*" = ["py.typed"]

[tool.setuptools.data-files]
"share/launch" = ["package.xml"]
"share/ament_index/resource_index/packages" = ["resource/launch"]
"share/launch/frontend" = ["share/launch/frontend/grammar.lark"]

[tool.mypy]
ignore_missing_imports = true

[tool.pytest.ini_options]
junit_family = "xunit2"
addopts = "--doctest-modules"
timeout = 900
timeout_method = "thread"
