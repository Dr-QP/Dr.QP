    max_acceleration: 0

  # ---- right_back ----
  dr_qp/right_back_coxa:
    has_velocity_limits: true
    max_velocity: 3.14159
    has_acceleration_limits: false
    max_acceleration: 0
  dr_qp/right_back_femur:
    has_velocity_limits: true
    max_velocity: 3.14159
