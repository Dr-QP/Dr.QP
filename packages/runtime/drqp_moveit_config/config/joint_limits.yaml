    max_velocity: 3.14159
    has_acceleration_limits: false
    max_acceleration: 0
  dr_qp/right_front_tibia:
    has_velocity_limits: true
    max_velocity: 3.14159
    has_acceleration_limits: false
    max_acceleration: 0

  # ---- left_middle ----
  dr_qp/left_middle_coxa:
