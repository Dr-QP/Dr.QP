    has_acceleration_limits: false
    max_acceleration: 0
  dr_qp/left_middle_tibia:
    has_velocity_limits: true
    max_velocity: 3.14159
    has_acceleration_limits: false
    max_acceleration: 0

  # ---- right_middle ----
  dr_qp/right_middle_coxa:
    has_velocity_limits: true
    max_velocity: 3.14159
    has_acceleration_limits: false
    max_acceleration: 0
  dr_qp/right_middle_femur:
    has_velocity_limits: true
    max_velocity: 3.14159
    has_acceleration_limits: false
    max_acceleration: 0
  dr_qp/right_middle_tibia:
    has_velocity_limits: true
    max_velocity: 3.14159
    has_acceleration_limits: false
    max_acceleration: 0

  # ---- left_back ----
  dr_qp/left_back_coxa:
    has_velocity_limits: true
    max_velocity: 3.14159
