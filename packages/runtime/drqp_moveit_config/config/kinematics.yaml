# Kinematics solver configuration for Dr.QP hexapod legs.
#
# Each leg is a 3-DOF serial chain (coxaâ†’femurâ†’tibiaâ†’foot).
# KDLKinematicsPlugin handles such chains out of the box.
#
# search_resolution  â€“ step size (rad) used when searching for IK solutions
# timeout            â€“ maximum time (s) per IK call
