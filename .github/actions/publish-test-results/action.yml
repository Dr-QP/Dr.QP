name: Publish test results
description: Summarize xUnit reports and upload them to Codecov as test results

inputs:
  codecov-token:
    description: Codecov token used to upload test results
    required: true
  logs-artifact-name:
    description: Artifact name used when uploading logs
    required: true
  reports-artifact-name:
    description: Artifact name used when uploading xUnit reports
    required: true
  reports-glob:
    description: Glob passed to test-summary/action
    required: false
    default: build/*/test_results/*/*.xunit.xml
  reports-root:
    description: Directory to scan for xUnit XML reports
    required: false
    default: build
  logs-path:
    description: Path uploaded as the logs artifact
    required: false
    default: log
  retention-days:
    description: Retention period for uploaded artifacts
    required: false
    default: '90'

runs:
  using: composite
  steps:
    - name: Test Summary
      uses: test-summary/action@v2.6
      if: ${{ env.ACT == '' && !cancelled() }}
      with:
        paths: ${{ inputs.reports-glob }}

    - name: Discover test reports
      id: test_reports
      if: ${{ !cancelled() }}
      shell: bash -xeuo pipefail {0}
      env:
        INPUTS_REPORTS_ROOT: ${{ inputs.reports-root }}
      run: |
        test_reports=$(find "$INPUTS_REPORTS_ROOT" -name "*.xunit.xml" | tr '\n' ',')
        test_reports=${test_reports%,}

        echo "result=$test_reports" >> "$GITHUB_OUTPUT"
        if [[ -n "$test_reports" ]]; then
          echo "$test_reports"
        else
          echo "No xUnit test reports found under $INPUTS_REPORTS_ROOT"
        fi

    - name: Upload test results to Codecov
      if: ${{ !cancelled() && steps.test_reports.outputs.result != '' }}
      uses: codecov/codecov-action@v6.0.1
      with:
        report_type: test_results
        token: ${{ inputs.codecov-token }}
        files: ${{ steps.test_reports.outputs.result }}

    - name: Upload test reports artifact
      if: ${{ always() && !cancelled() }}
      uses: actions/upload-artifact@v7.0.1
      with:
        name: ${{ inputs.reports-artifact-name }}
        path: ${{ inputs.reports-glob }}
        if-no-files-found: ignore
        retention-days: ${{ inputs.retention-days }}

    - name: Upload logs artifact
      if: ${{ always() && !cancelled() }}
      uses: actions/upload-artifact@v7.0.1
      with:
        name: ${{ inputs.logs-artifact-name }}
        path: ${{ inputs.logs-path }}
        if-no-files-found: ignore
        retention-days: ${{ inputs.retention-days }}
