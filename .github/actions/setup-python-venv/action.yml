name: Setup Python venv
description: Setup Python virtual environment with caching for uv-managed dependencies

inputs:
  python-version:
    description: Python version to use
    required: false
    default: '3.12'

outputs:
  venv-path:
    description: Path to the virtual environment
    value: .venv

runs:
  using: composite
  steps:
    - uses: getsentry/action-setup-venv@v2.1.1
      id: venv
      with:
        python-version: ${{ inputs.python-version }}
        cache-dependency-path: |
          pyproject.toml
          uv.lock
          py_packages/validate_agents/pyproject.toml
          packages/runtime/drqp_brain/setup.py
        install-cmd: python -m pip install --disable-pip-version-check uv && python -m uv sync
