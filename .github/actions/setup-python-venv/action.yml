name: Setup Python venv
description: Setup Python virtual environment with caching for uv-managed dependencies

inputs:
  python-version:
    description: Python version to use
    required: false
    default: '3.12'

outputs:
  venv-path:
    description: Path to the virtual environment
    value: .venv

runs:
  using: composite
  steps:
    - uses: getsentry/action-setup-venv@3a832a9604b3e1a4202ae559248f26867b467cc7 # v2.1.1
      id: venv
      with:
        python-version: ${{ inputs.python-version }}
        cache-dependency-path: |
          pyproject.toml
          uv.lock
          py_packages/validate_agents/pyproject.toml
          packages/runtime/drqp_brain/setup.py
        install-cmd: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --frozen
