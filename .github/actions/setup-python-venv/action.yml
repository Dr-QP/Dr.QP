name: Setup Python venv
description: Setup Python virtual environment with caching for uv-managed dependencies

inputs:
  python-version:
    description: Python version to use
    required: false
    default: '3.12'

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      id: setup-python
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: '0.10.9'
        # we just cache the venv-dir directly in action-setup-venv
        enable-cache: false

    - name: Restore venv cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      id: cache-venv
      with:
        path: .venv
        key: setup-venv-${{ runner.os }}-py-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('uv.lock') }}-uv-sync-frozen-all

    - name: Create venv
      if: steps.cache-venv.outputs.cache-hit != 'true'
      run: python -m venv .venv
      shell: bash

    - name: Activate venv
      run: |
        source .venv/bin/activate
        echo "VIRTUAL_ENV=${VIRTUAL_ENV}" >> "${GITHUB_ENV}"
        echo "${VIRTUAL_ENV}/bin" >> "${GITHUB_PATH}"
      shell: bash

    - name: Install dependencies
      if: steps.cache-venv.outputs.cache-hit != 'true'
      run: uv sync --frozen --active --all-groups --all-extras
      shell: bash
