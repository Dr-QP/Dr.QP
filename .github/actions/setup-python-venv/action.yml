name: Setup Python venv
description: Setup Python virtual environment with caching for uv-managed dependencies

inputs:
  python-version:
    description: Python version to use
    required: false
    default: '3.12'

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: '0.10.9'
        # we just cache the venv-dir directly in action-setup-venv
        enable-cache: false

    - uses: getsentry/action-setup-venv@5a80476d175edf56cb205b08bc58986fa99d1725 # v3.2.0
      with:
        python-version: ${{ inputs.python-version }}
        cache-dependency-path: uv.lock
        install-cmd: uv sync --frozen --active --all-groups --all-extras
