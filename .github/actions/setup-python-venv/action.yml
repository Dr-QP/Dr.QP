name: Setup Python venv
description: Setup Python virtual environment with caching for uv-managed dependencies

inputs:
  python-version:
    description: Python version to use
    required: false
    default: '3.12'

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      with:
        version: '0.10.9'
        # we just cache the venv-dir directly in action-setup-venv
        enable-cache: false

    - uses: getsentry/action-setup-venv@v3.1.0
      with:
        python-version: ${{ inputs.python-version }}
        cache-dependency-path: uv.lock
        install-cmd: uv sync --frozen --active --all-groups --all-extras
