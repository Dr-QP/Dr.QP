name: Shared paths filters
description: A set of filters to be used to fitler jobs
inputs:
  base-branch:
    description: Base branch
    required: false
    default: main
  extra-filter:
    description: Extra filters (YAML list entries, one per line)
    required: false
    default: 'default-path-that-will-never-match'
outputs:
  pass:
    description: Filtered file present
    value: ${{ steps.filter.outputs.ros }}
runs:
  using: composite
  steps:
  - name: Build filters
    id: build-filters
    shell: bash
    run: |
      # Build the filters YAML with proper formatting for extra-filter
      EXTRA=$(printf '%s\n' "${{ inputs.extra-filter }}" | \
        sed -En 's/^[[:space:]]*-[[:space:]]*//p' | \
        sed -E 's/^/        - /' | \
        sed '/^        - $/d')
      {
        echo "filters<<EOF"
        cat <<'YAML'
      ros:
        - .clang-format
        - .devcontainer/**
        - .github/actions/**
        - codecov.yml
        - docker/**
        - packages/**
        - scripts/**
      YAML
        if [ -n "$EXTRA" ]; then
          printf '%s\n' "$EXTRA"
        fi
        echo "EOF"
      } >> "$GITHUB_OUTPUT"

  - name: Filter
    id: filter
    uses: dorny/paths-filter@v3.0.2
    with:
      base: ${{ inputs.base-branch }}
      filters: ${{ steps.build-filters.outputs.filters }}
