name: Commit format changes
description: Detect, commit, and verify formatter changes for same-repository pull requests.

inputs:
  branch:
    description: Branch or ref to commit to.
    required: true
  caller-event-name:
    description: Event name from the calling workflow.
    required: false
    default: ''
  caller-pr-head-repo-full-name:
    description: Pull request head repository full name from the calling workflow.
    required: false
    default: ''
  caller-pr-head-sha:
    description: Pull request head SHA from the calling workflow.
    required: false
    default: ''
  commit-message:
    description: Commit message for formatter changes.
    required: true

outputs:
  changed:
    description: Whether formatting produced file changes in the checked out tree.
    value: ${{ steps.diff.outputs.changed }}
  committed:
    description: Whether changes were committed and pushed.
    value: ${{ steps.commit-result.outputs.committed }}
  skipped:
    description: Whether committing was skipped after detecting changes.
    value: ${{ steps.verify.outputs.skip_commit }}

runs:
  using: composite
  steps:
    - name: Detect formatter changes
      id: diff
      shell: bash -xeuo pipefail {0}
      run: |
        if [[ -n "$(git status --porcelain)" ]]; then
          echo "changed=true" >> "$GITHUB_OUTPUT"
        else
          echo "changed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Verify if not recursive commit
      if: always() && steps.diff.outputs.changed == 'true'
      id: verify
      shell: bash -xeuo pipefail {0}
      run: |
        skip_commit=false
        if [[ "${INPUTS_CALLER_EVENT_NAME}" != "pull_request" ]]; then
          echo "Not a pull request. Skipping commit."
          skip_commit=true
        elif [[ "${GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME}" != "${GITHUB_REPOSITORY}" ]]; then
          echo "Pull request is from a fork. Skipping commit."
          skip_commit=true
        elif [[ "$(git show -s --format=%B "${GITHUB_EVENT_PULL_REQUEST_HEAD_SHA}")" == "${INPUTS_COMMIT_MESSAGE}" ]]; then
          echo "Reformatted in previous commit. Skipping commit."
          skip_commit=true
        fi

        echo "skip_commit=$skip_commit" >> "$GITHUB_OUTPUT"
      env:
        GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ inputs.caller-pr-head-repo-full-name }}
        GITHUB_EVENT_PULL_REQUEST_HEAD_SHA: ${{ inputs.caller-pr-head-sha }}
        INPUTS_CALLER_EVENT_NAME: ${{ inputs.caller-event-name }}
        INPUTS_COMMIT_MESSAGE: ${{ inputs.commit-message }}

    - name: Commit all changed files back to the repository
      uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
      if: always() && steps.diff.outputs.changed == 'true' && steps.verify.outputs.skip_commit != 'true'
      id: commit
      with:
        # Specify the branch to commit to instead of checkout, otherwise super-linter's GITHUB_SHA validation fails to find the commit.
        # For pull requests, this will be the source branch; for pushes, this will be the current branch.
        branch: ${{ inputs.branch }}
        commit_message: ${{ inputs.commit-message }}

    - name: Record commit result
      id: commit-result
      shell: bash -xeuo pipefail {0}
      run: |
        committed=false
        if [[ "${STEPS_COMMIT_OUTCOME}" == 'success' ]]; then
          committed=true
        fi
        echo "committed=$committed" >> "$GITHUB_OUTPUT"
      env:
        STEPS_COMMIT_OUTCOME: ${{ steps.commit.outcome }}

    - name: Verify changes were committed if any
      if: always() && steps.diff.outputs.changed == 'true'
      shell: bash -xeuo pipefail {0}
      run: |
        git diff --exit-code
        git diff --exit-code --cached
