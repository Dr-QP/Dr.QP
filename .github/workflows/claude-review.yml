name: Claude Responder

on:
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  issues:
    types:
      - opened
      - assigned
  pull_request_review:
    types:
      - submitted
  pull_request:
    types:
      - opened
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number}}-${{ github.event.comment.id || github.event.review.id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  review:
    if: |
      github.repository_owner == 'Dr-QP' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
        (github.event_name == 'pull_request')
      )
    name: Claude Responder
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    timeout-minutes: 15
    environment: claude-review
    steps:
      # issue_comment (the common "@claude review" trigger) fires with the
      # default branch as context.sha — it carries no head ref/sha for the
      # PR being commented on. Resolve the PR's actual head commit here so
      # the checkout below gives Claude the PR's code, not origin/main.
      - name: Determine checkout ref
        id: checkout_ref
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const { eventName, payload } = context;
            let ref = context.sha;

            if (payload.pull_request?.head?.sha) {
              // pull_request, pull_request_review, and pull_request_review_comment
              // events already carry the full pull_request object.
              ref = payload.pull_request.head.sha;
            } else if (eventName === 'issue_comment' && payload.issue?.pull_request) {
              // issue_comment only gives us the PR number; look up its head sha.
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: payload.issue.number,
              });
              ref = pr.head.sha;
            }

            core.setOutput('ref', ref);

      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ steps.checkout_ref.outputs.ref }}
          fetch-depth: 1
          persist-credentials: false

        # Automated review when a PR is opened/reopened: always run the pr-review skill.
      - name: Claude PR Review
        if: ${{ github.event_name == 'pull_request' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Trigger when specific user is assigned to an issue
          assignee_trigger: 'claude-bot'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Use the pr-review skill to review this pull request

      # Comment/mention-driven requests (issue_comment, pull_request_review_comment,
      # pull_request_review, issues): no fixed prompt, so Claude responds to whatever
      # was actually asked in the comment. It can invoke the pr-review skill itself
      # if the request is a review.
      - name: Claude Code Respond
        if: ${{ github.event_name != 'pull_request' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Trigger when specific user is assigned to an issue
          assignee_trigger: 'claude-bot'

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}
