name: Reformat code

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  COMMIT_MESSAGE: Apply linter fixes and reformatting

jobs:
  paths-filter:
    name: Need to run?
    runs-on: ${{ vars.AMD_ONLY == '1' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions: {}
    timeout-minutes: 10
    outputs:
      pass: ${{ steps.override.outputs.pass }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filters
        uses: ./.github/actions/paths-filter
        id: filter
        with:
          extra-filter: |
            - .github/workflows/reformat.yml
            - docs/source/notebooks/**
            - ansible/**
            - packages/**/*.cpp
            - packages/**/*.h
            - packages/**/*.py
            - scripts/cpp-reformat.sh
            - scripts/python-reformat.sh
            - .clang-format
            - '**/*.md'
            - '**/*.markdown'
            - '**/*.yml'
            - '**/*.yaml'
            - '**/*.json'
            - '**/*.sh'
            - '**/*.bash'
            - '**/*.zsh'
            - '**/Dockerfile'
            - '**/Dockerfile.*'

      - name: Override pass for draft AI PRs
        id: override
        shell: bash
        run: |
          set -e

          pass='${{ steps.filter.outputs.pass }}'
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.draft }}" == "true" ]]; then
            case "${{ github.actor }}" in
              *copilot*|*cursor*|*codex*|*claude*)
                pass='false'
                ;;
            esac
          fi

          echo "pass=$pass" >> "$GITHUB_OUTPUT"

  reformat:
    name: Reformat
    needs: paths-filter
    if: needs.paths-filter.outputs.pass == 'true'
    runs-on: 'ubuntu-24.04' # superlinter only supports x86_64 for now
    container:
      image: ghcr.io/dr-qp/jazzy-ros-desktop:edge
    permissions:
      statuses: write # To update PR status
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Required for git diff to work properly
          ref: ${{ github.head_ref }}
          token: ${{ secrets.REPO_PAT }} # Use PAT to allow CI reruns on pushed commits

      - name: Add workspace to safe directories
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Python venv
        uses: ./.github/actions/setup-python-venv

      - name: Reformat C++
        shell: bash -le {0}
        run: |
          source /opt/ros/jazzy/setup.bash
          ./scripts/cpp-reformat.sh || true

      - name: Reformat Python
        shell: bash -le {0}
        run: |
          source /opt/ros/jazzy/setup.bash
          ./scripts/python-reformat.sh || true

      - name: Run Super-Linter
        uses: super-linter/super-linter/slim@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'workflow_dispatch' }}
          FILTER_REGEX_EXCLUDE: '(^|/)(build|install|log|\.venv|packages/vendor|\.git)/'


          # Markdown: lint via Prettier only
          VALIDATE_MARKDOWN_PRETTIER: true
          FIX_MARKDOWN_PRETTIER: true

          # Additional file types not currently covered by existing CI linters
          VALIDATE_YAML_PRETTIER: true
          VALIDATE_JSON_PRETTIER: true
          VALIDATE_JSONC_PRETTIER: true
          VALIDATE_BASH: true
          VALIDATE_DOCKERFILE_HADOLINT: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: true
          VALIDATE_GITLEAKS: true

          FIX_YAML_PRETTIER: true
          FIX_JSON_PRETTIER: true
          FIX_JSONC_PRETTIER: true
          FIX_GITHUB_ACTIONS_ZIZMOR: true


      - name: Verify if not recursive commit
        id: verify
        shell: bash -le {0}
        run: |
          set -x
          set -e

          skip_commit=false
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Not a pull request. Skipping commit."
            skip_commit=true
          elif [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "Pull request is from a fork. Skipping commit."
            skip_commit=true
          elif [[ $(git log -1 --pretty=%B) == "$COMMIT_MESSAGE" ]]; then
            echo "Reformatted in previous commit. Skipping commit."
            skip_commit=true
          fi

          echo "skip_commit=$skip_commit" >> "$GITHUB_OUTPUT"

      - name: Commit all changed files back to the repository
        uses: stefanzweifel/git-auto-commit-action@v7
        if: steps.verify.outputs.skip_commit != 'true'
        id: commit
        with:
          commit_message: ${{ env.COMMIT_MESSAGE }}

      - name: Verify changes were committed if any
        shell: bash -le {0}
        run: |
          set -x
          set -e

          git diff --exit-code
          git diff --exit-code --cached
