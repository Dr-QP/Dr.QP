name: Copilot Setup Steps

on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: copilot
    steps:
      - uses: oven-sh/setup-bun@v2
      - uses: astral-sh/setup-uv@v7
