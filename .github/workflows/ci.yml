name: CI/CD

on:
  workflow_call:
    inputs:
      caller_event_name:
        description: Event name from the calling workflow.
        required: false
        default: ''
        type: string
      caller_pr_head_sha:
        description: Pull request head SHA from the calling workflow.
        required: false
        default: ''
        type: string
      clean_build:
        description: Build images from scratch instead of reusing the edge image.
        required: false
        default: false
        type: boolean
      force_run:
        description: Run CI even when the path filter does not match.
        required: false
        default: false
        type: boolean
    secrets:
      CODECOV_TOKEN:
        required: false

defaults:
  run:
    shell: bash -xeuo pipefail {0}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  ROS_DISTRO: jazzy
  REGISTRY: ghcr.io
  REGISTRY_USERNAME: ${{ github.actor }} # for nektos/act, use your own username via --actor option

jobs:
  paths-filter:
    name: Need to run?
    runs-on: ${{ vars.AMD_ONLY == '1' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions: {}
    timeout-minutes: 10
    outputs:
      pass: ${{ steps.filter.outputs.pass }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Filters
        uses: ./.github/actions/paths-filter
        id: filter
        with:
          extra-filter: |
            - .github/workflows/ci.yml
            - .github/actions/log-debug-stats/**

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}

  build-dev-image:
    name: Development image
    timeout-minutes: 35
    needs: paths-filter
    if: needs.paths-filter.outputs.pass == 'true' || inputs.force_run
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: ${{ vars.AMD_ONLY == '1' && 'amd64' || 'arm64' }}
          - arch: ${{ vars.ARM_ONLY == '1' && 'arm64' || 'amd64' }}
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Check commit message for clean-build
        id: clean_build_msg
        if: inputs.caller_event_name == 'push' || inputs.caller_event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pattern = /\[ci:clean_build\]/;
            const commitMessage = context.payload.head_commit?.message ?? '';
            const prBody = context.payload.pull_request?.body ?? '';
            const found = pattern.test(commitMessage) || pattern.test(prBody);
            core.setOutput('found', found);

      - name: Set base image refs
        id: base_refs
        env:
          CLEAN_BUILD_DISPATCH: ${{ inputs.clean_build }}
          CLEAN_BUILD_COMMIT: ${{ steps.clean_build_msg.outputs.found == 'true' }}
          CLEAN_BUILD_MERGE_GROUP: ${{ inputs.caller_event_name == 'merge_group' }}
          IS_MAIN: ${{ github.ref == 'refs/heads/main' || contains(github.ref, 'tags/v') }}
        run: |
          echo "ansible_base=ubuntu:24.04" >> "$GITHUB_OUTPUT"

          if [[ $CLEAN_BUILD_DISPATCH = true ]] \
            || [[ $CLEAN_BUILD_COMMIT = true ]] \
            || [[ $CLEAN_BUILD_MERGE_GROUP = true ]] \
            || [[ $IS_MAIN = true ]]; then
            echo "Cleaning build required"
            exit 0
          fi

          DEV_IMAGE="${{ env.REGISTRY }}/dr-qp/${{ env.ROS_DISTRO }}-ros-desktop:edge"

          sudo apt-get update -qq && sudo apt-get install -y -qq skopeo

          if skopeo inspect --creds "${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}" \
             "docker://${DEV_IMAGE}" >/dev/null 2>&1; then
             echo "Using edge image as base to speed up build. Include [ci:clean_build] in your commit message to force a clean build. Alternatively, use workflow_dispatch to force a clean build."
             echo "ansible_base=$DEV_IMAGE" >> "$GITHUB_OUTPUT"
          else
            echo "Edge image not found; building from scratch"
          fi

      - name: Build ubuntu ansible
        id: build_ubuntu_ansible
        uses: ./.github/actions/docker/build-push-action
        with:
          context: docker/ansible
          file: docker/ansible/Dockerfile
          image: ${{ env.REGISTRY }}/dr-qp/ubuntu-ansible
          arch: ${{ matrix.arch }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ env.REGISTRY_USERNAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}
          build-args: |
            BASE_IMAGE=${{ steps.base_refs.outputs.ansible_base }}

      - name: Build development docker image
        id: build
        uses: ./.github/actions/docker/build-push-action
        with:
          context: docker/ros
          file: docker/ros/desktop/ros-desktop.dockerfile
          image: ${{ env.REGISTRY }}/dr-qp/${{ env.ROS_DISTRO }}-ros-desktop
          arch: ${{ matrix.arch }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ env.REGISTRY_USERNAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}
          build-args: |
            ROS_DISTRO=${{ env.ROS_DISTRO }}
            FROM_IMAGE=ghcr.io/dr-qp/ubuntu-ansible@${{ steps.build_ubuntu_ansible.outputs.digest }}

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}

  merge-dev-image:
    name: Merge development image
    runs-on: ${{ vars.AMD_ONLY == '1' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions:
      packages: write
    needs:
      - build-dev-image
    timeout-minutes: 35
    outputs:
      image: ${{ steps.merge.outputs.image }}
      image_pinned: ${{ steps.merge.outputs.image_pinned }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Merge and push ansible docker image
        uses: ./.github/actions/docker/multiarch-merge
        with:
          image: ${{ env.REGISTRY }}/dr-qp/ubuntu-ansible
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ env.REGISTRY_USERNAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge and push development docker image
        id: merge
        uses: ./.github/actions/docker/multiarch-merge
        with:
          image: ${{ env.REGISTRY }}/dr-qp/${{ env.ROS_DISTRO }}-ros-desktop
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ env.REGISTRY_USERNAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}

  ros-ci:
    name: Build and test ROS2 workspace
    needs: [merge-dev-image]
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: ${{ vars.AMD_ONLY == '1' && 'amd64' || 'arm64' }}
          - arch: ${{ vars.ARM_ONLY == '1' && 'arm64' || 'amd64' }}
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions:
      packages: read
    container:
      image: ${{ needs.merge-dev-image.outputs.image_pinned }} # zizmor: ignore[unpinned-images]
    steps:
      - name: copy .colcon to GHA's $HOME
        run: |
          cp -r /root/.colcon "$HOME"
          colcon mixin list

      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Build ROS workspace
        run: |
          sudo apt update
          rosdep update
          ./scripts/ros-dep.sh
          source "scripts/setup.bash"

          # symlink-install is a must to collect proper coverage for python nodes
          python3 -m colcon build --mixin coverage-pytest ninja rel-with-deb-info --event-handlers console_cohesion+ console_direct+ --symlink-install --cmake-args -D DRQP_ENABLE_COVERAGE=ON

      - name: Test ROS workspace
        run: |
          ./scripts/ros-dep.sh
          source "scripts/setup.bash"

          echo ''
          cat "$(ros2 pkg prefix drqp_brain)/lib/drqp_brain/drqp_robot_state"
          echo ''
          which python3
          echo ''
          python3 -c 'import statemachine'
          echo ''

          # -rA makes pytest report captured output for passing tests too (launch_pytest output is otherwise hidden on success).
          # PYTEST_ADDOPTS is used instead of --pytest-args because colcon can't forward pytest args to ctest-driven (ament_cmake) tests.
          PYTEST_ADDOPTS=-rA python3 -m colcon test --mixin coverage-pytest --event-handlers console_cohesion+ console_direct+ --return-code-on-test-failure

      - name: Process llvm coverage
        run: ./packages/cmake/llvm-cov-export-all.py ./build

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7.0.0
        if: ${{ env.ACT == '' && !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests-${{ matrix.arch }}
          name: codecov-umbrella
          directory: build/
          exclude: |
            packages/vendor/**

      - name: Test Summary
        uses: ./.github/actions/publish-test-results
        if: ${{ !cancelled() }}
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          logs-artifact-name: colcon-logs-${{ matrix.arch }}
          reports-artifact-name: colcon-test-reports-${{ matrix.arch }}

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}

  dev-container-ci:
    name: Devcontainer image
    needs: [merge-dev-image]
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: ${{ vars.AMD_ONLY == '1' && 'amd64' || 'arm64' }}
            SIMULATION_TEST_MODE: ''
          - arch: ${{ vars.ARM_ONLY == '1' && 'arm64' || 'amd64' }}
            SIMULATION_TEST_MODE: 'slow'
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions:
      packages: read
    steps:
      # Running container will fail with act due to no Docker in Docker, only Docker outside of Docker
      # https://github.com/Dr-QP/Dr.QP/wiki/Issue-using-%60act%60-and-%60devcontainers-ci%60
      # DinD requires an image that has dockerd installed, so run with -P ubuntu-latest=ghcr.io/corvina-r-d/ubuntu:act-22.04
      # DinD requires --priviliged option as well
      #
      #
      # DinD fails under QEMU emulation of arm64 on the amd64 CPUs:
      # iptables: Failed to initialize nft: Protocol not supported
      # https://github.com/multiarch/qemu-user-static/issues/191
      - name: optionally start DinD for act (local testing)
        if: env.ACT
        run: |
          dockerd -H unix:///var/run/dind.sock & sleep 5;
          echo "DOCKER_HOST=unix:///var/run/dind.sock" >> "${GITHUB_ENV}"

      - name: optionally test DinD for act (local testing)
        if: env.ACT
        run: |
          docker run --rm ghcr.io/dr-qp/hello-world:linux
          id

      - name: Install updated Skopeo needed for docker/buildx
        run: |
          sudo apt-get update
          sudo apt-get install skopeo -y

      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch devcontainer.json to use image built in this workflow
        env:
          MERGED_IMAGE: ${{ needs.merge-dev-image.outputs.image_pinned }}
        run: |
          sed -i "s|image:.*|image: ${MERGED_IMAGE}|g" .devcontainer/docker-compose.yml

      - name: Build and test dev container image
        uses: devcontainers/ci@v0.3.1900000450
        with:
          configFile: .devcontainer/devcontainer.json
          noCache: true
          runCmd: |
            # Test that Docker is working in the dev container (Docker-in-Docker)
            docker run --rm hello-world | head -n 5

            sudo apt update
            rosdep update
            ./scripts/ros-dep.sh
            source "scripts/setup.bash"
            python3 -m colcon build --mixin ninja rel-with-deb-info --event-handlers console_cohesion+ console_direct+

            ./scripts/ros-dep.sh
            source "scripts/setup.bash"

            test_status=0
            # -rA makes pytest report captured output for passing tests too (launch_pytest output is otherwise hidden on success).
            # PYTEST_ADDOPTS is used instead of --pytest-args because colcon can't forward pytest args to ctest-driven (ament_cmake) tests.
            PYTEST_ADDOPTS=-rA python3 -m colcon test --event-handlers console_cohesion+ console_direct+ --return-code-on-test-failure || test_status=$?

            mkdir -p ./.tmp/devcontainer-ci
            rm -rf ./.tmp/devcontainer-ci/build ./.tmp/devcontainer-ci/log
            cp -a build ./.tmp/devcontainer-ci/build
            cp -a log ./.tmp/devcontainer-ci/log

            exit "$test_status"
          env:
            # Pass the build args to devcontainer build
            DRQP_TEST_MODE=${{ matrix.SIMULATION_TEST_MODE }}

      - name: Publish devcontainer test results
        if: ${{ !cancelled() }}
        uses: ./.github/actions/publish-test-results
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          logs-artifact-name: devcontainer-logs-${{ matrix.arch }}
          reports-artifact-name: devcontainer-test-reports-${{ matrix.arch }}
          reports-glob: .tmp/devcontainer-ci/build/*/test_results/*/*.xunit.xml
          reports-root: .tmp/devcontainer-ci/build
          logs-path: .tmp/devcontainer-ci/log

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}

  build-deploy-image:
    name: Deployment image
    needs: [merge-dev-image, ros-ci]
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: ${{ vars.AMD_ONLY == '1' && 'amd64' || 'arm64' }}
          - arch: ${{ vars.ARM_ONLY == '1' && 'arm64' || 'amd64' }}
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Build deployment docker image
        uses: ./.github/actions/docker/build-push-action
        with:
          context: docker/ros/deploy
          file: docker/ros/deploy/ros-deploy.dockerfile
          image: ${{ env.REGISTRY }}/dr-qp/${{ env.ROS_DISTRO }}-ros-deploy
          arch: ${{ matrix.arch }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ env.REGISTRY_USERNAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}
          build-args: |
            ROS_DISTRO=${{ env.ROS_DISTRO }}
            GIT_SHA=${{ inputs.caller_pr_head_sha || github.sha }}
            BUILD_IMAGE=${{ needs.merge-dev-image.outputs.image }}

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}

  merge-deploy-image:
    name: Merge deployment image
    runs-on: ${{ vars.AMD_ONLY == '1' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions:
      packages: write
    needs:
      - build-deploy-image
    timeout-minutes: 35
    outputs:
      image: ${{ steps.merge.outputs.image }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Merge and push deployment docker image
        id: merge
        uses: ./.github/actions/docker/multiarch-merge
        with:
          image: ${{ env.REGISTRY }}/dr-qp/${{ env.ROS_DISTRO }}-ros-deploy
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ env.REGISTRY_USERNAME }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}

  merge-all:
    name: CI/CD finished
    needs:
      [
        paths-filter,
        build-dev-image,
        merge-dev-image,
        ros-ci,
        build-deploy-image,
        merge-deploy-image,
        dev-container-ci,
      ]
    runs-on: ${{ vars.AMD_ONLY == '1' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
    timeout-minutes: 10
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Execution was not needed!
        if: needs.paths-filter.outputs.pass != 'true' && !inputs.force_run
        run: |
          exit 0
      - name: All jobs succeeded!
        if: ${{ success() }}
        run: |
          exit 0
      - name: Some jobs have failed!
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          exit 1
      - name: Some jobs have been cancelled!
        if: ${{ cancelled() || contains(needs.*.result, 'cancelled') }}
        run: |
          exit 1

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}
