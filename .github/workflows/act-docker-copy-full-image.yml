name: Act Docker - Copy full images

on:
  workflow_dispatch:
  schedule:
    # Rerun workflow to pick up the latest source images
    - cron: 0 12 */7 * * # “At 12:00 on every 7th day-of-month.” https://crontab.guru/#0_12_*/7_*_*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SLUG: ${{ github.repository_owner }}/catthehacker-ubuntu
  PUSH_GHCR: ${{ github.repository == (github.event.pull_request.head.repo.full_name || github.repository) && '1' || '' }}
  PUSH_QUAY: ${{ secrets.QUAY_USER && secrets.QUAY_TOKEN && '1' || '' }}
  PUSH_DOCKER_HUB: ${{ secrets.DOCKER_USER && secrets.DOCKER_TOKEN && '1' || '' }}

defaults:
  run:
    shell: sh
jobs:
  copy:
    name: Copy image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 20
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        copy:
          - src: ghcr.io/catthehacker/ubuntu:act-24.04
            dest: act-24.04
          - src: ghcr.io/catthehacker/ubuntu:act-22.04
            dest: act-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Force SLUG to lowercase
        uses: actions/github-script@v9.0.0
        with:
          github-token: n/a
          script: |
            core.exportVariable('SLUG', process.env.SLUG.toLowerCase());

      - name: Push to GitHub Container Registry
        if: env.PUSH_GHCR
        run: |
          skopeo copy -a \
            --src-creds "${GITHUB_ACTOR}:${{ github.token }}" \
            --dest-creds "${GITHUB_ACTOR}:${{ github.token }}" \
            "docker://${{ matrix.copy.src }}" \
            "docker://ghcr.io/${SLUG}:${{ matrix.copy.dest }}"

      - name: Push to Quay
        if: env.PUSH_QUAY
        run: |
          skopeo copy -a \
            --src-creds "${GITHUB_ACTOR}:${{ github.token }}" \
            --dest-creds "${{ secrets.QUAY_USER }}:${{ secrets.QUAY_TOKEN }}" \
            "docker://${{ matrix.copy.src }}" \
            "docker://quay.io/${SLUG}:${{ matrix.copy.dest }}"

      - name: Push to Docker Hub
        if: env.PUSH_DOCKER_HUB
        run: |
          skopeo copy -a \
            --src-creds "${GITHUB_ACTOR}:${{ github.token }}" \
            --dest-creds "${{ secrets.DOCKER_USER }}:${{ secrets.DOCKER_TOKEN }}" \
            "docker://${{ matrix.copy.src }}" \
            "docker://docker.io/${SLUG}:${{ matrix.copy.dest }}"

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}
