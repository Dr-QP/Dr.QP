name: Require Copilot Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - review_requested
      - review_request_removed
  pull_request_review:
    types:
      - submitted
      - dismissed
      - edited
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read
  pull-requests: read

jobs:
  copilot-review-present:
    name: copilot-review-present
    runs-on: ubuntu-latest

    steps:
      - name: Verify Copilot reviewed PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ github.token }}
          script: |
            if (context.eventName === 'merge_group') {
              core.info('Merge group event, skipping Copilot review check');
              return;
            }

            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('No pull_request in event payload');
              return;
            }

            // Optional: skip drafts if you do not want to block drafts
            // if (pr.draft) {
            //   core.info('Draft PR, skipping');
            //   return;
            // }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;
            const copilotLogin = 'copilot-pull-request-reviewer[bot]';

            const eventReview = context.payload.review;
            const eventReviewState = eventReview?.state?.toLowerCase();
            if (
              eventReview?.user?.login === copilotLogin &&
              eventReviewState &&
              eventReviewState !== 'pending' &&
              eventReviewState !== 'dismissed'
            ) {
              core.info(
                `Found Copilot review from event payload for ${eventReview.commit_id} with state ${eventReview.state}.`
              );
              return;
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            // Require an active submitted Copilot review for any commit in the PR.
            const matchingReview = [...reviews].reverse().find((review) => {
              const login = review.user?.login;
              const state = review.state?.toLowerCase();
              return (
                login === copilotLogin &&
                state &&
                state !== 'pending' &&
                state !== 'dismissed'
              );
            });

            if (!matchingReview) {
              core.setFailed('Copilot has not submitted a review for this PR.');
              return;
            }

            core.info(
              `Found Copilot review by ${matchingReview.user.login} for ${matchingReview.commit_id} with state ${matchingReview.state}.`
            );
