name: Copilot Validation

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  paths-filter:
    name: Need to run?
    runs-on: ${{ vars.AMD_ONLY == '1' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
    timeout-minutes: 10
    outputs:
      pass: ${{ steps.filter.outputs.pass }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Filters
        uses: ./.github/actions/paths-filter
        id: filter
        with:
          extra-filter: |
            - .github/agents/**
            - .github/instructions/**
            - .github/skills/**
            - .github/workflows/copilot.yml
            - .github/actions/log-debug-stats/**
            - py_packages/**/*.py

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}

  validate-copilot-files:
    name: Validate Copilot Customizations
    runs-on: ubuntu-latest
    needs: paths-filter
    permissions:
      contents: read
    if: needs.paths-filter.outputs.pass == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Python venv
        uses: ./.github/actions/setup-python-venv

      - name: Test validate_agent_files
        run: |
          pytest py_packages/validate_agent_files/tests \
            --cov=validate_agent_files --cov-report=xml

      - name: Validate Copilot Customizations
        run: validate_agent_files --recommend .github

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: validate-agent-files
          name: validate-agent-files-coverage
          files: coverage.xml

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}

  finished:
    name: Validation finished
    needs: [paths-filter, validate-copilot-files]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Execution was not needed!
        if: needs.paths-filter.outputs.pass != 'true'
        run: |
          exit 0
      - name: All jobs succeeded!
        if: ${{ success() }}
        run: |
          exit 0
      - name: Some jobs have failed!
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          exit 1
      - name: Some jobs have been cancelled!
        if: ${{ cancelled() || contains(needs.*.result, 'cancelled') }}
        run: |
          exit 1

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}
