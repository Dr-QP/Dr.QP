name: 'CodeQL Advanced'

on:
  workflow_call:
    inputs:
      force_run:
        description: Run CodeQL even when the path filter does not match.
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  ROS_DISTRO: jazzy # duplicated in job.container.image
  CMAKE_EXPORT_COMPILE_COMMANDS: '1'
  REGISTRY_USERNAME: ${{ github.actor }} # for nektos/act, use your own username via --actor option

jobs:
  paths-filter:
    name: Need to run?
    runs-on: ${{ vars.AMD_ONLY == '1' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions: {}
    timeout-minutes: 10
    outputs:
      pass: ${{ steps.filter.outputs.pass }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Filters
        uses: ./.github/actions/paths-filter
        id: filter
        with:
          extra-filter: |
            - .github/workflows/codeql.yml
            - .github/actions/log-debug-stats/**

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: paths-filter
    if: needs.paths-filter.outputs.pass == 'true' || inputs.force_run
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners (GitHub.com only)
    # Consider using larger runners or machines with greater resources for possible analysis time improvements.
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/dr-qp/jazzy-ros-desktop:edge
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual
          - language: python
            build-mode: none
          - language: actions
            build-mode: none
            supports-dismissal: false
          - language: javascript-typescript
            build-mode: none
        # CodeQL supports the following values keywords for 'language': 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'swift'
        # Use `c-cpp` to analyze code written in C, C++ or both
        # Use 'java-kotlin' to analyze code written in Java, Kotlin or both
        # Use 'javascript-typescript' to analyze code written in JavaScript, TypeScript or both
        # To learn more about changing the languages that are analyzed or customizing the build mode for your analysis,
        # see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning.
        # If you are analyzing a compiled language, you can modify the 'build-mode' for that language to customize how
        # your codebase is analyzed, see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages
    steps:
      - name: Checkout repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      # Add any setup steps before running the `github/codeql-action/init` action.
      # This includes steps like installing compilers or runtimes (`actions/setup-node`
      # or others). This is typically only required for manual builds.
      # - name: Setup runtime (example)
      #   uses: actions/setup-example@v1

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list here with "+" to use these queries and those in the config file.

          # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
          # queries: security-extended,security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      # If the analyze step fails for one of the languages you are analyzing with
      # "We were unable to automatically build your code", modify the matrix above
      # to set the build mode to "manual" for that language. Then modify this step
      # to build your code.
      # ℹ️ Command-line programs to run using the OS shell.
      # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun
      - name: Build C++ code
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          set -x
          set -e

          source "/opt/ros/${{ env.ROS_DISTRO }}/setup.bash"
          sudo apt-get update
          rosdep update
          ./scripts/ros-dep.sh
          colcon build --cmake-args -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          category: '/language:${{matrix.language}}'
          output: sarif-results
          upload: failure-only

      - name: Find sarif file
        id: sarif
        run: |
          file=$(find sarif-results -name "*.sarif")
          echo "file=$PWD/$file" >> "$GITHUB_OUTPUT"

      - name: Upload loc as a Build Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{matrix.language}}-raw.sarif
          path: ${{ steps.sarif.outputs.file }}
          retention-days: 7

      - name: filter-sarif
        uses: advanced-security/filter-sarif@2da736ff05ef065cb2894ac6892e47b5eac2c3c0 # v1.1
        with:
          input: ${{ steps.sarif.outputs.file }}
          output: ${{ steps.sarif.outputs.file }}
          patterns: |
            -**/build/**
            -**/install/**
            -**/logs/**
            -**/examples/**
            -**/test/**
            -**/node_modules/**
            -**/packages/vendor/**

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        id: upload-sarif
        with:
          sarif_file: ${{ steps.sarif.outputs.file }}

        # Unlock inline mechanism to suppress CodeQL warnings.
        # https://github.com/github/codeql/issues/11427#issuecomment-1721059096
      - name: Dismiss alerts that were suppressed with inline comments
        # run auto dismissal only on main branch, aka reviewed code only, since dismissals are global
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: advanced-security/dismiss-alerts@046d6b48d2e43cf563f96f67332c47c432eff83e # v2.0.2
        with:
          sarif-id: ${{ steps.upload-sarif.outputs.sarif-id }}
          sarif-file: ${{ steps.sarif.outputs.file }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload loc as a Build Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{matrix.language}}-filtered.sarif
          path: ${{ steps.sarif.outputs.file }}
          retention-days: 7

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}

  merge-all:
    name: Code Analysis finished
    needs: [paths-filter, analyze]
    runs-on: ${{ vars.AMD_ONLY == '1' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
    timeout-minutes: 10
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Execution was not needed!
        if: needs.paths-filter.outputs.pass != 'true' && !inputs.force_run
        run: |
          exit 0
      - name: All jobs succeeded!
        if: ${{ success() }}
        run: |
          exit 0
      - name: Some jobs have failed!
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          exit 1
      - name: Some jobs have been cancelled!
        if: ${{ cancelled() || contains(needs.*.result, 'cancelled') }}
        run: |
          exit 1

      - name: Log debug stats
        if: ${{ always() }}
        uses: ./.github/actions/log-debug-stats
        with:
          github-token: ${{ github.token }}
